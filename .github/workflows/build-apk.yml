name: Build Nayan TV APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: artifacts/nayan-tv

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install
        working-directory: artifacts/nayan-tv
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Make Gradlew executable
        run: chmod +x ./gradlew
        working-directory: artifacts/nayan-tv/android

      - name: Build APK
        run: |
          export NODE_BINARY=$(which node)
          ./gradlew assembleDebug --no-daemon
        working-directory: artifacts/nayan-tv/android
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nayan-TV-APK
          path: artifacts/nayan-tv/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
