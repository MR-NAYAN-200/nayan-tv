name: Build Nayan TV APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: artifacts/nayan-tv

      - name: Build APK (EAS Local)
        run: eas build --local --platform android --profile preview --non-interactive --output ./nayan-tv.apk
        working-directory: artifacts/nayan-tv
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nayan-TV-APK
          path: artifacts/nayan-tv/nayan-tv.apk
          retention-days: 30
