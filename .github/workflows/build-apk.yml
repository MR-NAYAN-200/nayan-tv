name: Build Nayan TV APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install
        working-directory: artifacts/nayan-tv

      - name: Expo Prebuild (Generate Android project)
        run: npx expo prebuild --platform android --no-install
        working-directory: artifacts/nayan-tv

      - name: Make Gradlew executable
        run: chmod +x ./gradlew
        working-directory: artifacts/nayan-tv/android

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon
        working-directory: artifacts/nayan-tv/android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Nayan-TV-APK
          path: artifacts/nayan-tv/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
