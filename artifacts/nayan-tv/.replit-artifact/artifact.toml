kind = "mobile"
previewPath = "/"
title = "Nayan TV"
version = "1.0.0"
id = "artifacts/nayan-tv"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24233

[services.development]
run = "pnpm --filter @workspace/nayan-tv run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nayan-tv", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/nayan-tv", "run", "serve" ]

[services.env]
PORT = "24233"
BASE_PATH = "/"
